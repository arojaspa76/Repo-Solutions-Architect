# Project:     GenAIDemo
# Component:   Azure Key Vault CSI SecretProviderClass
# Description: Mounts Key Vault secrets as environment variables for genaidemo-dev
# Owner:       Andrés Felipe Rojas Parra
# Created:     2026-07

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: genaidemo-secrets
  namespace: genaidemo-dev
spec:
  provider: azure
  secretObjects:
    - secretName: genaidemo-secrets-sync
      type: Opaque
      data:
        - objectName: COSMOS-DB-CONNECTION-STRING
          key: COSMOS_DB_CONNECTION_STRING
        - objectName: REDIS-ACCESS-KEY
          key: REDIS_ACCESS_KEY
        - objectName: AZURE-AD-CLIENT-ID
          key: AZURE_AD_CLIENT_ID
        - objectName: AZURE-AD-CLIENT-SECRET
          key: AZURE_AD_CLIENT_SECRET
        - objectName: AZURE-AD-TENANT-ID
          key: AZURE_AD_TENANT_ID
        - objectName: AZURE-OPENAI-KEY
          key: AZURE_OPENAI_KEY
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "$(AKS_KUBELET_IDENTITY_CLIENT_ID)"
    keyvaultName: "$(KEY_VAULT_NAME)"
    tenantId: "$(AZURE_TENANT_ID)"
    objects: |
      array:
        - |
          objectName: COSMOS-DB-CONNECTION-STRING
          objectType: secret
        - |
          objectName: REDIS-ACCESS-KEY
          objectType: secret
        - |
          objectName: AZURE-AD-CLIENT-ID
          objectType: secret
        - |
          objectName: AZURE-AD-CLIENT-SECRET
          objectType: secret
        - |
          objectName: AZURE-AD-TENANT-ID
          objectType: secret
        - |
          objectName: AZURE-OPENAI-KEY
          objectType: secret
